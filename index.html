<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Калькулятор сложного процента</title>
<style>
  :root {
    color-scheme: light;
    --page: #f9f9f7;
    --panel: #fcfcfb;
    --ink: #0b0b0b;
    --ink-2: #52514e;
    --muted: #898781;
    --grid: #e1e0d9;
    --axis: #c3c2b7;
    --border: rgba(11,11,11,.10);
    --accent: #2a78d6;
    --s1: #2a78d6;   /* баланс */
    --s2: #eb6834;   /* вложено */
    --s3: #1baf7a;   /* снято */
    --good: #006300;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --page: #0d0d0d;
      --panel: #1a1a19;
      --ink: #ffffff;
      --ink-2: #c3c2b7;
      --muted: #898781;
      --grid: #2c2c2a;
      --axis: #383835;
      --border: rgba(255,255,255,.10);
      --accent: #3987e5;
      --s1: #3987e5;
      --s2: #d95926;
      --s3: #199e70;
      --good: #0ca30c;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font: 15px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--page);
    color: var(--ink);
    padding: 28px 24px 48px;
  }
  .wrap { max-width: 1040px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }
  h1 { font-size: 21px; margin: 0 0 4px; }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
  }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 16px 18px; }
  .field label { display: block; font-size: 12.5px; color: var(--muted); margin-bottom: 5px; }
  input[type=number], select {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--page);
    color: var(--ink);
    font-size: 15px;
  }
  input:focus, select:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  input:disabled { opacity: .45; }

  .switchline { display: flex; align-items: center; gap: 8px; margin-top: 8px; cursor: pointer; user-select: none; }
  .switchline input { width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer; }
  .switchline span { font-size: 13px; color: var(--ink-2); }

  .rangeline { display: flex; align-items: center; gap: 12px; }
  input[type=range] { flex: 1; accent-color: var(--accent); }
  .rangeval { min-width: 46px; text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; }

  .seg { display: inline-flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .seg button {
    padding: 8px 14px; border: none; background: var(--page); color: var(--ink-2);
    font-size: 14px; cursor: pointer;
  }
  .seg button.on { background: var(--accent); color: #fff; }

  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
  .stat { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
  .stat .v { font-size: 21px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .stat .l { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .stat.hl .v { color: var(--accent); }
  .stat.wd .v { color: var(--s3); }

  .chart-head { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; margin-bottom: 8px; }
  .chart-title { font-weight: 650; font-size: 15px; }
  .legend { display: flex; gap: 14px; font-size: 13px; color: var(--ink-2); }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .sw { width: 14px; height: 3px; border-radius: 2px; display: inline-block; }
  .logline { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--ink-2); margin-left: auto; cursor: pointer; }
  .logline input { accent-color: var(--accent); width: 15px; height: 15px; }
  #chart { width: 100%; display: block; }
  #chart text { font: 12px system-ui, -apple-system, "Segoe UI", sans-serif; fill: var(--muted); }
  #chart .endlabel { font-weight: 650; }
  .chartwrap { position: relative; }
  #tooltip {
    position: absolute; pointer-events: none; display: none; z-index: 5;
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 10px; font-size: 13px; box-shadow: 0 4px 14px rgba(0,0,0,.22); white-space: nowrap;
  }
  #tooltip .t { color: var(--muted); margin-bottom: 3px; }
  #tooltip .r { display: flex; align-items: center; gap: 6px; font-variant-numeric: tabular-nums; }

  .tablewrap { overflow: auto; max-height: 62vh; border-radius: 10px; border: 1px solid var(--border); }
  table { border-collapse: collapse; width: 100%; font-variant-numeric: tabular-nums; }
  th, td { padding: 7px 12px; text-align: right; border-bottom: 1px solid var(--grid); white-space: nowrap; }
  th { position: sticky; top: 0; background: var(--panel); color: var(--muted); font-weight: 600; font-size: 12.5px; z-index: 1; }
  td:first-child, th:first-child { text-align: left; color: var(--muted); }
  td.gain { color: var(--good); }
  td.wd { color: var(--s3); }
  tbody tr:hover td { background: rgba(127,127,127,.07); }
  tr:last-child td { border-bottom: none; }
  .warn { color: #e6a23c; font-size: 13px; margin-top: 8px; }
</style>
</head>
<body>
<div class="wrap">
<h1>Калькулятор сложного процента</h1>

<div class="card">
  <div class="grid">
    <div class="field">
      <label for="start">Стартовый вклад</label>
      <input type="number" id="start" value="400" min="0" step="any">
    </div>
    <div class="field">
      <label for="rate">Ставка за период, %</label>
      <input type="number" id="rate" value="0.0275" min="0" step="any">
    </div>
    <div class="field">
      <label for="period">Период начисления</label>
      <select id="period">
        <option value="18" selected>каждые 18 часов</option>
        <option value="24">каждый день</option>
        <option value="168">каждую неделю</option>
        <option value="month">каждый месяц</option>
        <option value="year">каждый год</option>
      </select>
    </div>
    <div class="field">
      <label for="contrib">Взнос / мес</label>
      <input type="number" id="contrib" value="400" min="0" step="any">
      <label class="switchline"><input type="checkbox" id="useContrib" checked><span>добавлять каждый месяц</span></label>
    </div>
  </div>
  <div class="grid" style="margin-top:16px">
    <div class="field" style="grid-column: span 2; min-width: 260px;">
      <label for="wd">Забирать себе из дохода (остальное реинвестируется)</label>
      <div class="rangeline">
        <input type="range" id="wd" min="0" max="100" step="5" value="0">
        <span class="rangeval" id="wdVal">0%</span>
      </div>
    </div>
    <div class="field">
      <label>Показывать</label>
      <div class="seg" id="viewSeg">
        <button type="button" data-v="years" class="on">По годам</button>
        <button type="button" data-v="months">По месяцам</button>
      </div>
    </div>
    <div class="field">
      <label for="years">Сколько лет (1–1000)</label>
      <input type="number" id="years" value="40" min="1" max="1000" step="1">
    </div>
  </div>
  <div class="warn" id="warn"></div>
</div>

<div class="stats">
  <div class="stat"><div class="v" id="stApy">—</div><div class="l">APY (с учётом капитализации)</div></div>
  <div class="stat hl"><div class="v" id="stFinal">—</div><div class="l">итог на счету</div></div>
  <div class="stat"><div class="v" id="stInvested">—</div><div class="l">вложено своих</div></div>
  <div class="stat"><div class="v" id="stGain" style="color:var(--good)">—</div><div class="l">доход (реинвестированный)</div></div>
  <div class="stat wd"><div class="v" id="stWd">—</div><div class="l">снято себе за всё время</div></div>
  <div class="stat wd"><div class="v" id="stWdMo">—</div><div class="l">пассивный доход/мес в последний год</div></div>
</div>

<div class="card chartwrap">
  <div class="chart-head">
    <span class="chart-title">Рост капитала</span>
    <div class="legend">
      <span><i class="sw" style="background:var(--s1)"></i>Баланс</span>
      <span><i class="sw" style="background:var(--s2)"></i>Вложено</span>
      <span id="lgWd" style="display:none"><i class="sw" style="background:var(--s3)"></i>Снято всего</span>
    </div>
    <label class="logline"><input type="checkbox" id="logScale"> лог. шкала</label>
  </div>
  <svg id="chart" viewBox="0 0 960 360" role="img" aria-label="График роста баланса, вложений и снятого"></svg>
  <div id="tooltip"></div>
</div>

<div class="card" style="padding:0">
  <div class="tablewrap">
    <table>
      <thead>
        <tr>
          <th id="periodHead">Год</th>
          <th>Баланс</th>
          <th>Вложено</th>
          <th>Доход за период</th>
          <th>Снято за период</th>
          <th>Снято всего</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
</div>
</div>

<script>
const $ = id => document.getElementById(id);
let view = 'years';
let chartData = [];
let pts = [];

function fmt(x) {
  if (!isFinite(x)) return '∞';
  if (x >= 1e15) return x.toExponential(3).replace('e+', '·10^');
  const opts = x < 10000 ? { maximumFractionDigits: 2 } : { maximumFractionDigits: 0 };
  return x.toLocaleString('ru-RU', opts);
}
function fmtShort(x) {
  if (!isFinite(x)) return '∞';
  if (x >= 1e15) return x.toExponential(1).replace('e+', 'e');
  if (x >= 1e12) return (x/1e12).toLocaleString('ru-RU',{maximumFractionDigits:1}) + ' трлн';
  if (x >= 1e9)  return (x/1e9).toLocaleString('ru-RU',{maximumFractionDigits:1}) + ' млрд';
  if (x >= 1e6)  return (x/1e6).toLocaleString('ru-RU',{maximumFractionDigits:1}) + ' млн';
  if (x >= 1e3)  return (x/1e3).toLocaleString('ru-RU',{maximumFractionDigits:0}) + ' тыс';
  return x.toLocaleString('ru-RU',{maximumFractionDigits:0});
}

function calc() {
  const start = +$('start').value || 0;
  const rate = (+$('rate').value || 0) / 100;
  const period = $('period').value;
  const useContrib = $('useContrib').checked;
  const contrib = useContrib ? (+$('contrib').value || 0) : 0;
  const wdShare = (+$('wd').value || 0) / 100;
  const years = Math.min(1000, Math.max(1, Math.floor(+$('years').value || 1)));

  $('contrib').disabled = !useContrib;
  $('wdVal').textContent = Math.round(wdShare*100) + '%';
  $('periodHead').textContent = view === 'months' ? 'Месяц' : 'Год';
  $('lgWd').style.display = wdShare > 0 ? '' : 'none';

  const periodsPerYear = period === 'year' ? 1 : period === 'month' ? 12 : (365 * 24) / +period;
  const apy = Math.pow(1 + rate, periodsPerYear) - 1;
  const mf = Math.pow(1 + rate, periodsPerYear / 12);
  const totalMonths = years * 12;
  const MAX_ROWS = 12000;
  const step = view === 'months' ? 1 : 12;
  $('warn').textContent = totalMonths / step > MAX_ROWS
    ? `Слишком много строк для помесячного вида — показаны первые ${MAX_ROWS} месяцев.` : '';

  let bal = start, invested = start, wdTotal = 0;
  let perInterest = 0, perWd = 0;
  const rows = [];
  chartData = [{ m: 0, bal: start, invested: start, wd: 0 }];

  for (let m = 1; m <= totalMonths; m++) {
    const interest = bal * (mf - 1);
    const take = interest * wdShare;
    bal += interest - take + contrib;
    invested += contrib;
    wdTotal += take;
    perInterest += interest - take;
    perWd += take;
    chartData.push({ m, bal, invested, wd: wdTotal });
    const isRow = view === 'months' ? true : (m % 12 === 0);
    if (isRow && rows.length < MAX_ROWS) {
      rows.push({ period: view === 'months' ? m : m / 12, bal, invested,
                  gain: perInterest, take: perWd, wdTotal });
      perInterest = 0; perWd = 0;
    }
    if (!isFinite(bal)) break;
  }

  const last = rows[rows.length - 1];
  $('stApy').textContent = (apy*100).toLocaleString('ru-RU',{maximumFractionDigits:2}) + '%';
  $('stFinal').textContent = last ? fmt(last.bal) : '—';
  $('stInvested').textContent = last ? fmt(last.invested) : '—';
  $('stGain').textContent = last ? fmt(last.bal - last.invested) : '—';
  $('stWd').textContent = last ? fmt(last.wdTotal) : '—';
  // пассивный доход/мес: снятое за последние 12 мес / 12
  const lastYearWd = chartData.length > 13
    ? chartData[chartData.length-1].wd - chartData[chartData.length-13].wd
    : (last ? last.wdTotal : 0);
  $('stWdMo').textContent = fmt(lastYearWd / 12) + '/мес';

  $('rows').innerHTML = rows.map(r =>
    `<tr><td>${r.period}</td><td>${fmt(r.bal)}</td><td>${fmt(r.invested)}</td>` +
    `<td class="gain">+${fmt(r.gain)}</td><td class="wd">${r.take ? '+'+fmt(r.take) : '—'}</td>` +
    `<td class="wd">${r.wdTotal ? fmt(r.wdTotal) : '—'}</td></tr>`
  ).join('');

  drawChart();
}

const W = 960, H = 360, PAD = { l: 74, r: 96, t: 14, b: 34 };

function drawChart() {
  const svg = $('chart');
  const log = $('logScale').checked;
  const showWd = (+$('wd').value || 0) > 0;
  const data = chartData.filter(d => isFinite(d.bal));
  if (data.length < 2) { svg.innerHTML = ''; return; }

  const stride = Math.max(1, Math.ceil(data.length / 600));
  pts = data.filter((_, i) => i % stride === 0 || i === data.length - 1);

  const xMax = data[data.length - 1].m;
  const keys = showWd ? ['bal','invested','wd'] : ['bal','invested'];
  const vals = pts.flatMap(d => keys.map(k => d[k])).filter(v => !log || v > 0);
  let vMin = Math.min(...vals), vMax = Math.max(...vals);
  if (vMax === vMin) vMax = vMin + 1;

  const X = m => PAD.l + (m / xMax) * (W - PAD.l - PAD.r);
  let Y;
  if (log) {
    const lo = Math.log10(Math.max(vMin, 1e-9)), hi = Math.log10(vMax);
    Y = v => PAD.t + (1 - (Math.log10(Math.max(v, 1e-9)) - lo) / (hi - lo || 1)) * (H - PAD.t - PAD.b);
  } else {
    Y = v => PAD.t + (1 - v / (vMax || 1)) * (H - PAD.t - PAD.b);
  }

  let yTicks = [];
  if (log) {
    const lo = Math.ceil(Math.log10(Math.max(vMin, 1e-9))), hi = Math.floor(Math.log10(vMax));
    const every = Math.max(1, Math.ceil((hi - lo) / 5));
    for (let e = lo; e <= hi; e += every) yTicks.push(Math.pow(10, e));
    if (!yTicks.length) yTicks = [vMin, vMax];
  } else {
    const n = 5, rawStep = vMax / n, mag = Math.pow(10, Math.floor(Math.log10(rawStep)));
    const nice = [1, 2, 2.5, 5, 10].find(k => k * mag >= rawStep) * mag;
    for (let v = 0; v <= vMax + 1e-9; v += nice) yTicks.push(v);
  }
  const totalYears = xMax / 12;
  const xEvery = totalYears <= 12 ? 1 : Math.ceil(totalYears / 10);

  const line = key => 'M' + pts.map(d => `${X(d.m).toFixed(1)},${Y(Math.max(d[key], log ? vMin : 0)).toFixed(1)}`).join('L');

  let s = '';
  for (const v of yTicks) {
    const y = Y(v).toFixed(1);
    s += `<line x1="${PAD.l}" x2="${W - PAD.r}" y1="${y}" y2="${y}" stroke="var(--grid)"/>`;
    s += `<text x="${PAD.l - 8}" y="${+y + 4}" text-anchor="end">${fmtShort(v)}</text>`;
  }
  for (let yr = 0; yr <= totalYears; yr += xEvery)
    s += `<text x="${X(yr*12).toFixed(1)}" y="${H - PAD.b + 18}" text-anchor="middle">${yr}</text>`;
  s += `<text x="${W - PAD.r}" y="${H - PAD.b + 18}" text-anchor="start" dx="10">лет</text>`;
  s += `<line x1="${PAD.l}" x2="${W - PAD.r}" y1="${H - PAD.b}" y2="${H - PAD.b}" stroke="var(--axis)"/>`;

  if (showWd) s += `<path d="${line('wd')}" fill="none" stroke="var(--s3)" stroke-width="2"/>`;
  s += `<path d="${line('invested')}" fill="none" stroke="var(--s2)" stroke-width="2"/>`;
  s += `<path d="${line('bal')}" fill="none" stroke="var(--s1)" stroke-width="2"/>`;

  const lastP = pts[pts.length - 1];
  const ends = [{v:lastP.bal, c:'--s1'}, {v:lastP.invested, c:'--s2'}];
  if (showWd) ends.push({v:lastP.wd, c:'--s3'});
  ends.forEach(e => e.y = Y(Math.max(e.v, log ? vMin : 0)));
  ends.sort((a,b) => a.y - b.y);
  for (let i = 1; i < ends.length; i++) if (ends[i].y - ends[i-1].y < 15) ends[i].y = ends[i-1].y + 15;
  for (const e of ends)
    s += `<text class="endlabel" x="${W - PAD.r + 6}" y="${e.y + 4}" style="fill:var(${e.c})">${fmtShort(e.v)}</text>`;

  s += `<line id="crosshair" y1="${PAD.t}" y2="${H - PAD.b}" stroke="var(--axis)" visibility="hidden"/>`;
  for (const [id, c] of [['dot1','--s1'],['dot2','--s2'],['dot3','--s3']])
    s += `<circle id="${id}" r="4" fill="var(${c})" stroke="var(--panel)" stroke-width="2" visibility="hidden"/>`;
  s += `<rect id="hover" x="${PAD.l}" y="${PAD.t}" width="${W - PAD.l - PAD.r}" height="${H - PAD.t - PAD.b}" fill="transparent"/>`;

  svg.innerHTML = s;
  svg._scales = { X, Y, xMax, showWd };
  bindHover();
}

function bindHover() {
  const svg = $('chart'), tt = $('tooltip');
  const hover = $('hover');
  const move = ev => {
    const { X, Y, xMax, showWd } = svg._scales;
    const rect = svg.getBoundingClientRect();
    const sx = (ev.clientX - rect.left) * (W / rect.width);
    const m = Math.min(xMax, Math.max(0, (sx - PAD.l) / (W - PAD.l - PAD.r) * xMax));
    let best = pts[0], bd = Infinity;
    for (const p of pts) { const d = Math.abs(p.m - m); if (d < bd) { bd = d; best = p; } }
    const x = X(best.m);
    $('crosshair').setAttribute('x1', x); $('crosshair').setAttribute('x2', x);
    $('crosshair').setAttribute('visibility', 'visible');
    const dots = [['dot1', best.bal], ['dot2', best.invested], ['dot3', showWd ? best.wd : null]];
    for (const [id, v] of dots) {
      const el = $(id);
      if (v === null) { el.setAttribute('visibility','hidden'); continue; }
      el.setAttribute('cx', x); el.setAttribute('cy', Y(v)); el.setAttribute('visibility','visible');
    }
    const yr = Math.floor(best.m / 12), mo = best.m % 12;
    tt.innerHTML =
      `<div class="t">${yr ? yr + ' г.' : ''}${mo ? ' ' + mo + ' мес.' : (yr ? '' : 'старт')}</div>` +
      `<div class="r"><i class="sw" style="background:var(--s1)"></i>Баланс: <b>${fmt(best.bal)}</b></div>` +
      `<div class="r"><i class="sw" style="background:var(--s2)"></i>Вложено: <b>${fmt(best.invested)}</b></div>` +
      (showWd ? `<div class="r"><i class="sw" style="background:var(--s3)"></i>Снято: <b>${fmt(best.wd)}</b></div>` : '') +
      `<div class="r" style="color:var(--good)">Доход: ${fmt(best.bal - best.invested)}</div>`;
    tt.style.display = 'block';
    const panel = svg.parentElement.getBoundingClientRect();
    let left = ev.clientX - panel.left + 16;
    if (left + tt.offsetWidth > panel.width - 8) left = ev.clientX - panel.left - tt.offsetWidth - 16;
    tt.style.left = left + 'px';
    tt.style.top = (ev.clientY - panel.top - 10) + 'px';
  };
  hover.addEventListener('pointermove', move);
  hover.addEventListener('pointerleave', () => {
    tt.style.display = 'none';
    for (const id of ['crosshair','dot1','dot2','dot3']) $(id).setAttribute('visibility','hidden');
  });
}

['start','rate','period','contrib','useContrib','years','wd','logScale']
  .forEach(id => $(id).addEventListener('input', calc));
$('viewSeg').addEventListener('click', ev => {
  const b = ev.target.closest('button'); if (!b) return;
  view = b.dataset.v;
  for (const btn of $('viewSeg').children) btn.classList.toggle('on', btn === b);
  calc();
});
calc();
</script>
</body>
</html>
